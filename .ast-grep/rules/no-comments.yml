id: no-comments
language: TypeScript
severity: error
message: No code comments — put rationale in AGENTS.md/CONTEXT.md/skills.
rule:
  kind: comment
files:
  - "packages/*/src/**/*.ts"
  - "packages/*/test/**/*.ts"
  - "apps/*/src/**/*.ts"
  - "apps/*/test/**/*.ts"
ignores:
  - "node_modules/**"
  - "**/node_modules/**"
  - "dist/**"
  - "**/dist/**"
  - "build/**"
  - "**/build/**"
  - ".turbo/**"
  - "**/.turbo/**"
  - "coverage/**"
  - "**/coverage/**"
  - "vendor/**"
  - "**/vendor/**"
  - "vendored/**"
  - "**/vendored/**"
